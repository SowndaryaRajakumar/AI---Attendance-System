<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendoAI - Mark </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto; margin-top:2rem;">
            <h2 class="text-center mb-4 text-primary" style="color:var(--primary);">Mark Student Attendance</h2>
            
            <div id="global-error" class="error-msg"></div>
            <div id="global-success" class="success-msg"></div>
            
            <form id="markForm">
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="text" id="studentId" required placeholder="Paste student ID string here">
                    <small style="color:var(--text-muted); display:block; margin-top:4px;">You can view student IDs inside your external roster.</small>
                </div>
                <div class="form-group">
                    <label for="date">Class Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="status">Registration Status</label>
                    <select id="status" required>
                        <option value="present">Present</option>
                        <option value="absent">Absent</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="markBtn">Register Log To Blockchain</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const auth = requireAuth();
            if(!auth) return;
            
            // Check permissions explicitly avoiding URL spoofing
            if (auth.user.role === 'student') {
                window.location.replace('dashboard.html');
                return;
            }

            document.getElementById('date').valueAsDate = new Date();
        });

        document.getElementById('markForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('markBtn');
            const studentId = document.getElementById('studentId').value.trim();
            const date = document.getElementById('date').value;
            const status = document.getElementById('status').value;
            
            btn.disabled = true;
            btn.textContent = 'Transmitting...';
            clearError('global-error');
            clearError('global-success');
            
            try {
                await apiFetch('/attendance/mark', 'POST', { studentId, date, status });
                showSuccess('global-success', `Successfully bound ${status.toUpperCase()} state for student ${studentId} on ${date}.`);
                document.getElementById('studentId').value = '';
                
            } catch (err) {
                showError('global-error', "Backend rejected state mark: " + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Register Log To Immutable Database';
            }
        });
    </script>
</body>
</html>
